<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RRPD Receiving Dashboard</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/detroit-axle-logo.png" class="logo" />
      <div>
        <div class="title">RRPD Receiving Dashboard</div>
        <div class="subtitle">WH Returns + Manifest Compare + Manual Counts</div>
      </div>
    </div>

    <div class="top-actions">
      <label class="file-btn">
        <span>Upload WH CSV</span>
        <input id="whFile" type="file" accept=".csv" />
      </label>

      <button id="btnCopyEmail" class="btn">Copy Email</button>
      <button id="btnSaveLogs" class="btn">Logs</button>
      <button id="btnExportSummary" class="btn primary">Export</button>
    </div>
  </header>

  <main class="shell">

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="returns">Returns</button>
      <button class="tab" data-tab="manual">Manual</button>
      <button class="tab" data-tab="manifest">Manifest</button>
      <button class="tab" data-tab="logs">Logs</button>
    </nav>

    <!-- DASHBOARD -->
    <section class="panel active" id="panel-dashboard">

      <div class="grid grid-2">
        <div class="card">
          <div class="card-label">Packages</div>
          <div class="card-value" id="mPackages">0</div>
        </div>

        <div class="card">
          <div class="card-label">Parts</div>
          <div class="card-value" id="mParts">0</div>
        </div>
      </div>

      <!-- CONDITION CARDS -->
      <div class="condition-grid">
        <div class="card good"><div class="card-label">Good</div><div class="card-value" id="cGood">0</div></div>
        <div class="card used"><div class="card-label">Used</div><div class="card-value" id="cUsed">0</div></div>
        <div class="card core"><div class="card-label">Core</div><div class="card-value" id="cCore">0</div></div>
        <div class="card missing"><div class="card-label">Missing</div><div class="card-value" id="cMissing">0</div></div>
        <div class="card damaged"><div class="card-label">Damaged</div><div class="card-value" id="cDamaged">0</div></div>
        <div class="card notour"><div class="card-label">Not Our Parts</div><div class="card-value" id="cNotOur">0</div></div>
      </div>

    </section>

    <!-- RETURNS -->
    <section class="panel" id="panel-returns">
      <div class="card">
        <table class="table" id="tblReturns">
          <thead><tr><th>Condition</th><th>Rows</th><th>Pieces</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- MANUAL -->
    <section class="panel" id="panel-manual">
      <div class="card">
        <input id="manItem" placeholder="Item">
        <input id="manQty" placeholder="Qty">
        <input id="manCondition" placeholder="Condition">
        <button id="btnManualAdd" class="btn primary">Add</button>

        <table class="table" id="tblManual">
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- MANIFEST -->
    <section class="panel" id="panel-manifest">
      <div class="card">
        <input id="manifestFile" type="file">
        <div id="mManifestMissing">0</div>
      </div>
    </section>

    <!-- LOGS -->
    <section class="panel" id="panel-logs">
      <div class="card">
        <table class="table" id="tblLogs">
          <tbody></tbody>
        </table>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div id="statusLine">Ready</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
